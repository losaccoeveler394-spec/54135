<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta de Informações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f8ff;
}

/* HEADER */

.header{
background:#0046ff;
color:white;
padding:18px;
font-weight:600;
font-size:18px;
text-align:center;
}

/* CONTAINER */

.container{
max-width:420px;
margin:40px auto;
padding:20px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

/* TITULO */

h1{
font-size:24px;
margin-bottom:10px;
color:#222;
}

/* TEXTO */

.desc{
font-size:14px;
color:#555;
margin-bottom:25px;
line-height:1.5;
}

/* INPUT */

.input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:15px;
font-size:14px;
}

/* BOTAO */

.btn{
width:100%;
background:#0046ff;
color:white;
border:none;
padding:15px;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.btn:hover{
background:#0035c7;
}

/* INFO */

.info{
margin-top:15px;
font-size:12px;
color:#777;
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:#777;
}

.footer a{
color:#0046ff;
margin:0 6px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">
Portal de Consulta
</div>

<div class="container">

<div class="card">

<h1>Consultar Informações</h1>

<div class="desc">
Digite seus dados para acessar a página com mais informações disponíveis.
</div>

<input class="input" type="text" placeholder="Digite seu CPF">

<button class="btn" onclick="window.location.href='https://gilded-froyo-3220d1.netlify.app/'">
Consultar agora
</button>

<div class="info">
Você será direcionado para uma página externa com mais detalhes.
</div>

</div>

<div class="footer">

<a href="#">Política</a> |
<a href="#">Termos</a> |
<a href="#">Contato</a>

</div>

</div>

</body>
</html>
